name: Environment Secrets Practice

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Which environment to test against"
        type: choice
        options:
          - staging
          - production
        default: staging
        required: true

jobs:
  test-staging:
    if: github.event.inputs.target_env == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests against staging
        env:
          DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          echo "Running tests against STAGING environment"
          echo "DB_URL is available: ${#DB_URL} characters"
          echo "In real workflow: npm test -- --env=staging"

  test-production:
    if: github.event.inputs.target_env == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests against production
        env:
          DB_URL: ${{ secrets.PROD_DB_URL }}
        run: |
          echo "Running SMOKE TESTS against PRODUCTION environment"
          echo "DB_URL is available: ${#DB_URL} characters"
          echo "In real workflow: npm run smoke-tests -- --env=production"