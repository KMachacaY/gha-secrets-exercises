name: Secrets Practice

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  use-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show that secret exists but value is masked
        run: |
          echo "The API key is set: ${{ secrets.TEST_API_KEY != '' }}"
          echo "Attempting to print secret value (will be masked):"
          echo "${{ secrets.TEST_API_KEY }}"

      - name: Use secret as environment variable (correct pattern)
        env:
          API_KEY: ${{ secrets.TEST_API_KEY }}
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "API_KEY is available: ${#API_KEY} characters long"
          echo "DB_URL is available: ${#DB_URL} characters long"
          echo "This is how you safely use secrets in scripts"

      - name: Demonstrate secret in test context
        env:
          API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          echo "Running tests with API key..."
          echo "In a real workflow this would be: npm test"
          echo "And your test code would read process.env.API_KEY"
          if [ -z "$API_KEY" ]; then
            echo "ERROR: API_KEY is not set"
            exit 1
          else
            echo "API_KEY is available to tests - length: ${#API_KEY}"
          fi

      - name: Show what happens with undefined secret
        run: |
          echo "Undefined secret value: '${{ secrets.THIS_SECRET_DOES_NOT_EXIST }}'"
          echo "Empty string is returned for undefined secrets"