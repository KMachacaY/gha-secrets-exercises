name: Base64 Secret Practice

on:
  workflow_dispatch:

jobs:
  decode-certificate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode Base64 secret to file
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        run: |
          echo "Decoding certificate from Base64 secret..."
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.txt
          echo "Certificate file created successfully"
          echo "File size: $(wc -c < /tmp/certificate.txt) bytes"

      - name: Verify the decoded file
        run: |
          echo "Certificate file contents (safe to show - this is fake):"
          cat /tmp/certificate.txt
          echo "In a real workflow you would NOT print certificate contents"
          echo "You would use it directly: npm run test --cert=/tmp/certificate.txt"

      - name: Clean up sensitive file
        if: always()
        run: |
          rm -f /tmp/certificate.txt
          echo "Certificate file removed from runner"